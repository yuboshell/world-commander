<svg xmlns="http://www.w3.org/2000/svg" width="500" height="460" viewBox="0 0 500 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="agGray" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#9CA3AF"/></marker>
    <marker id="agBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#2563EB"/></marker>
    <marker id="agDark" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#333"/></marker>
  </defs>

  <!-- ── the command: a speech bubble (natural language) ─────────────── -->
  <rect x="14" y="16" width="236" height="94" rx="16" fill="#ffffff" stroke="#333" stroke-width="2.5"/>
  <polygon points="86,108 70,138 108,108" fill="#ffffff" stroke="#333" stroke-width="2.5"/>
  <polygon points="88,106 72,134 106,106" fill="#ffffff"/>

  <!-- voice waveform -->
  <rect x="30" y="40" width="5" height="26" rx="2.5" fill="#333"/>
  <rect x="39" y="32" width="5" height="42" rx="2.5" fill="#333"/>
  <rect x="48" y="46" width="5" height="14" rx="2.5" fill="#333"/>
  <rect x="57" y="38" width="5" height="30" rx="2.5" fill="#333"/>

  <!-- the two spoken orders, agent names colour-keyed to the dots below -->
  <text x="78" y="52" font-size="18" font-weight="600"><tspan fill="#2563EB">Blue</tspan><tspan fill="#1a1a1a">, push north.</tspan></text>
  <text x="78" y="84" font-size="18" font-weight="600"><tspan fill="#B45309">Amber</tspan><tspan fill="#1a1a1a">, hold the door.</tspan></text>

  <!-- ── the clock: real time, never pausing ─────────────────────────── -->
  <circle cx="442" cy="56" r="30" fill="#ffffff" stroke="#333" stroke-width="2.5"/>
  <line x1="442" y1="30" x2="442" y2="37" stroke="#333" stroke-width="2"/>
  <line x1="442" y1="82" x2="442" y2="75" stroke="#333" stroke-width="2"/>
  <line x1="416" y1="56" x2="423" y2="56" stroke="#333" stroke-width="2"/>
  <line x1="468" y1="56" x2="461" y2="56" stroke="#333" stroke-width="2"/>
  <line x1="442" y1="56" x2="428" y2="44" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="442" y1="56" x2="458" y2="42" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 444 22 A 34 34 0 0 1 478 58" fill="none" stroke="#333" stroke-width="2" marker-end="url(#agDark)"/>

  <!-- ── the command flows to the crowd ──────────────────────────────── -->
  <path d="M 90 132 C 130 200, 150 250, 205 300" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#agGray)"/>
  <path d="M 92 134 C 170 200, 240 260, 300 318" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#agGray)"/>
  <path d="M 94 136 C 220 220, 330 280, 392 332" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#agGray)"/>

  <!-- compass: north is up, so "push north" reads as the up arrows -->
  <line x1="470" y1="270" x2="470" y2="244" stroke="#9CA3AF" stroke-width="2" marker-end="url(#agGray)"/>
  <text x="464" y="288" font-size="15" fill="#9CA3AF">N</text>

  <!-- ── the crowd executes ──────────────────────────────────────────── -->
  <!-- the rest of the crowd (uncommanded) -->
  <circle cx="160" cy="392" r="13" fill="#6B7280"/>
  <circle cx="292" cy="408" r="13" fill="#0D9488"/>
  <circle cx="306" cy="316" r="13" fill="#6B7280"/>
  <circle cx="404" cy="362" r="13" fill="#0D9488"/>
  <circle cx="430" cy="408" r="13" fill="#6B7280"/>

  <!-- blue agents: pushing north (dashed motion arrows, up) -->
  <line x1="205" y1="332" x2="205" y2="300" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#agBlue)"/>
  <line x1="245" y1="352" x2="245" y2="320" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#agBlue)"/>
  <line x1="222" y1="402" x2="222" y2="370" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#agBlue)"/>
  <circle cx="205" cy="348" r="13" fill="#2563EB"/>
  <circle cx="245" cy="368" r="13" fill="#2563EB"/>
  <circle cx="222" cy="418" r="13" fill="#2563EB"/>

  <!-- amber agents: holding (seat line under the dot) -->
  <circle cx="338" cy="372" r="13" fill="#D9A406"/>
  <line x1="322" y1="392" x2="354" y2="392" stroke="#B45309" stroke-width="3"/>
  <circle cx="372" cy="410" r="13" fill="#D9A406"/>
  <line x1="356" y1="430" x2="388" y2="430" stroke="#B45309" stroke-width="3"/>
</svg>
